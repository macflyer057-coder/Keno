name: Keno Tirage 21h00

on:
  schedule:
    - cron: '0 19 * * *'  # 21h00 CEST
  workflow_dispatch:

jobs:
  check-tirage:
    runs-on: ubuntu-latest
    steps:
      - name: Keno FDJ 21h00
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          RESULT=$(curl -fsS "https://api.codetabs.com/v1/proxy?quest=https://www.fdj.fr/jeux-de-tirage/keno/resultats")
          NUMBERS=$(echo "$RESULT" | grep -o '\\"numbers\\":\[[^]]*\]' | grep -o '[0-9][0-9]*' | head -20 | tr '\n' ',')
          GRILLE="1,7,8,10,12,26,30,39,41,53"
          COUNT=0
          MATCHED=""
          for N in $(echo $GRILLE | tr ',' ' '); do
            if echo ",$NUMBERS," | grep -q ",$N,"; then
              COUNT=$((COUNT+1))
              MATCHED="$MATCHED $N"
            fi
          done
          DATE=$(date '+%d/%m/%Y')
          case $COUNT in
            10) GAIN="200000€" ;;
            9)  GAIN="2000€" ;;
            8)  GAIN="200€" ;;
            7)  GAIN="15€" ;;
            6)  GAIN="5€" ;;
            5|0) GAIN="2€" ;;
            *) GAIN="0€" ;;
          esac
          if [ $COUNT -ge 6 ]; then
            TITRE="🎉 $COUNT/10 ($GAIN) !"
            MSG="Numéros :$MATCHED — $DATE"
            PRIORITY="urgent"
            TAGS="tada"
          else
            TITRE="🎱 $DATE — $COUNT/10 ($GAIN)"
            MSG="$GRILLE"
            PRIORITY="default"
            TAGS="dart"
          fi
          echo "[$TITRE] $MSG"
          curl -fsS -X POST "https://ntfy.sh/$NTFY_TOPIC" \
            -H "Title: $TITRE" \
            -H "Priority: $PRIORITY" \
            -H "Tags: $TAGS" \
            -d "$MSG"
