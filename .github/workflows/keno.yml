name: Keno Tirage 21h00

on:
  schedule:
    - cron: '45 18 * * *'
  workflow_dispatch:

jobs:
  check-tirage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Keno FDJ 21h00
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          RESULT=$(curl -fsS "https://api.codetabs.com/v1/proxy?quest=https://www.fdj.fr/jeux-de-tirage/keno/resultats")
          NUMBERS=$(echo "$RESULT" \
            | grep -oE '"numbers"[^]]+]' \
            | grep -oE '\b([1-9]|[1-6][0-9]|70)\b' \
            | head -20 \
            | tr '\n' ',')

          if [ -z "$NUMBERS" ]; then
            RESULT2=$(curl -fsS "https://kenometric.fr/tirage/$(date '+%Y-%m-%d')/")
            NUMBERS=$(echo "$RESULT2" \
              | grep -oE 'ball[^>]*>([0-9]+)<' \
              | grep -oE '[0-9]+' \
              | head -20 \
              | tr '\n' ',')
          fi

          GRILLE="1,7,8,10,12,26,30,39,41,53"
          COUNT=0
          MATCHED=""
          for N in $(echo $GRILLE | tr ',' ' '); do
            if echo ",$NUMBERS," | grep -q ",$N,"; then
              COUNT=$((COUNT+1))
              MATCHED="$MATCHED $N"
            fi
          done

          DATE=$(date '+%d/%m/%Y')

          case $COUNT in
            10) GAIN_VAL=200000 ; GAIN_LIB="200000€" ;;
            9)  GAIN_VAL=2000   ; GAIN_LIB="2000€" ;;
            8)  GAIN_VAL=100    ; GAIN_LIB="100€" ;;
            7)  GAIN_VAL=10     ; GAIN_LIB="10€" ;;
            6)  GAIN_VAL=5      ; GAIN_LIB="5€" ;;
            5)  GAIN_VAL=2      ; GAIN_LIB="2€" ;;
            0)  GAIN_VAL=2      ; GAIN_LIB="2€" ;;
            *)  GAIN_VAL=0      ; GAIN_LIB="0€" ;;
          esac

          if [ -f gains.json ]; then
            TOTAL=$(python3 -c "import json; d=json.load(open('gains.json')); print(d.get('total',0))")
          else
            TOTAL=0
            echo '{"total":0,"historique":[]}' > gains.json
          fi

          NEW_TOTAL=$((TOTAL + GAIN_VAL))

          python3 - <<EOF
          import json
          with open('gains.json','r') as f:
              d = json.load(f)
          d['total'] = $NEW_TOTAL
          d['historique'].insert(0, {
              "date": "$DATE",
              "count": $COUNT,
              "gain": "$GAIN_LIB",
              "numeros": "$MATCHED".strip()
          })
          d['historique'] = d['historique'][:30]
          with open('gains.json','w') as f:
              json.dump(d, f, ensure_ascii=False, indent=2)
          EOF

          git config user.name "Keno Bot"
          git config user.email "bot@keno"
          git add gains.json
          git commit -m "Keno $DATE : $COUNT/10 ($GAIN_LIB) — total ${NEW_TOTAL}€" || echo "Rien à committer"
          git push

          if [ $COUNT -ge 6 ]; then
            TITRE="🎉 $COUNT/10 ($GAIN_LIB) !"
            MSG="Numéros :$MATCHED — Total cumulé : ${NEW_TOTAL}€"
            PRIORITY="urgent"
            TAGS="tada"
          else
            TITRE="🎱 $DATE — $COUNT/10 ($GAIN_LIB)"
            MSG="Total cumulé : ${NEW_TOTAL}€ | Tirage : $NUMBERS"
            PRIORITY="default"
            TAGS="dart"
          fi

          curl -fsS -X POST "https://ntfy.sh/$NTFY_TOPIC" \
            -H "Title: $TITRE" \
            -H "Priority: $PRIORITY" \
            -H "Tags: $TAGS" \
            -d "$MSG"
